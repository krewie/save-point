<title>Biohazard Files</title>

<style>
  html {
    scroll-behavior: smooth;
  }

.banner {
    width: 300px;
    height: auto; /* keep aspect ratio */
}

.header1 {
    text-align: center;
    color: #ff0000;
    font-size: 2rem;      /* font size 6 */
    font-weight: bold; /* <em> default */
    font-style: bold;  /* because you used <em> */
    margin: 0.6em 0 0.2em;
}

  body {
    margin: 0;
    background: #000;
    font-family:
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Meiryo",
        "Noto Sans JP",
        system-ui,
        sans-serif;
  }

  .re-book {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem;
    font-size: 25px;
    line-height: 1.8;
    letter-spacing: 0.02em;
    color: #e6e6e6;
  }

  /* TOC */
  .toc {
    margin-bottom: 4rem;
  }

  .toc strong {
    display: block;
    margin-bottom: 0.5rem;
    font-size: 20px;
  }

  .toc ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .toc li {
    margin-bottom: 0.4rem;
  }

  .toc a {
    color: #cfcfcf;
    text-decoration: none;
  }

  .toc a::before {
    content: "・";
  }

  .toc a:hover {
    text-decoration: underline;
  }

  /* FILE */
  .file {
    margin-bottom: 6rem;
  }

  .file h2 {
    font-size: 22px;
    margin-bottom: 2rem;
    border-bottom: 1px solid #333;
    padding-bottom: 0.5rem;
  }

  /* SLIDES */
  .slide {
    padding: 2rem 0;
    border-top: 1px solid #222;
  }

  .slide:first-of-type {
    border-top: none;
  }

  .slide p {
    margin: 0;
  }

  /* Optional page number style */
  .page-indicator {
    text-align: right;
    font-size: 14px;
    color: #999;
    margin-top: 1rem;
  }

.puzzle-image {
    width: 720px;
    height: auto; /* keep aspect ratio */
}
</style>

</head>
